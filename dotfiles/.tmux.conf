# Terminal colors
set -g default-terminal "xterm-256color"

# Enable mouse support
set -g mouse on

# Enable clipboard support
set -g set-clipboard on

# Increase scrollback buffer
set -g history-limit 10000

# Better status bar
set -g status-bg colour235
set -g status-fg colour136
set -g status-left-length 30
set -g status-right-length 150
set -g status-interval 5

# CTRL+a as prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# From https://blog.testdouble.com/posts/2016-11-18-reconciling-tmux-and-ssh-agent-forwarding
# Remove SSH_AUTH_SOCK to disable tmux automatically resetting the variable
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID \
                           SSH_CONNECTION WINDOWID XAUTHORITY"

# Use a symlink to look up SSH authentication
setenv -g SSH_AUTH_SOCK ~/.ssh/ssh_auth_sock

# vim mode for keys
setw -g mode-keys vi

# Pane navigation with vim style keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Create a new dev window: prompt for a path, open a window with two
# side-by-side panes, named after the basename of the path.
bind u command-prompt -p "path:" "run-shell '~/bin/tmux-new-dev-window \"%%\"'"
